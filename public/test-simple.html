<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Login Test</title>
    <style>
        body { font-family: Arial; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 10px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        h1 { color: white; text-align: center; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; }
        .success { background: #d4edda; color: #155724; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin: 10px 0; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; font-size: 11px; }
        .big { font-size: 22px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🔐 SUPER SIMPLE LOGIN TEST</h1>
    
    <div class="card">
        <div class="big" style="color: #667eea; text-align: center;">Testing Simplest Possible URL</div>
        <p style="text-align: center;">http://192.168.1.102/WD/public/api-login.php</p>
        <button onclick="test()">TEST LOGIN NOW</button>
        <div id="result"></div>
    </div>

    <script>
        async function test() {
            const result = document.getElementById('result');
            result.innerHTML = '<p style="text-align:center; color:#666;">Testing...</p>';
            
            try {
                const res = await fetch('http://192.168.1.102/WD/public/api-login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'dabysupy@mailinator.com',
                        password: 'reader123'
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    result.innerHTML = `
                        <div class="success">
                            <div class="big">✅ IT WORKS!</div>
                            <p><strong>Token:</strong> ${data.data.token}</p>
                            <p><strong>User:</strong> ${data.data.user.name}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                            <hr style="margin: 15px 0;">
                            <div style="background: #fff3cd; padding: 15px; border-radius: 8px;">
                                <strong>🎯 NEXT STEP:</strong><br><br>
                                In your React Native app:<br>
                                1. Shake device<br>
                                2. Tap "Reload"<br>
                                3. You'll see a test login screen<br>
                                4. Tap the button<br>
                                5. It should show the same success!
                            </div>
                        </div>
                    `;
                } else {
                    result.innerHTML = `<div class="error"><div class="big">❌ Failed</div><p>${data.message}</p></div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="error"><div class="big">❌ Error</div><p>${error.message}</p></div>`;
            }
        }
        
        window.onload = () => setTimeout(test, 500);
    </script>
</body>
</html>
